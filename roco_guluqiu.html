<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国咕噜球与精灵食物计算器 (极限位流版)</title>
    <script src="https://cdn.staticfile.org/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; --card-bg: #ffffff; --text-color: #333; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1200px; width: 100%; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 30px; }
        .sync-panel { background: #eef5fe; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        .sync-panel input, .sync-panel select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn:hover { background-color: #357abd; }
        .btn-success { background-color: #2ea44f; }
        .btn-success:hover { background-color: #248a3d; }
        .btn-danger { background-color: #e05d5d; }
        .btn-danger:hover { background-color: #c74d4d; }
        .btn-clear { background-color: #f39c12; }
        .btn-clear:hover { background-color: #d68010; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; text-align: center; max-width: 90%; width: 340px; }
        #qrcode { display: inline-block; margin: 15px 0; padding: 15px; background: white; border: 1px solid #ddd; border-radius: 8px; }

        .main-content { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 30px; }
        @media (max-width: 992px) { .main-content { grid-template-columns: 1fr; } }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid var(--primary-color); }
        .section-title { font-size: 18px; font-weight: bold; color: #444; margin: 0; }
        .grid-inputs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (max-width: 480px) { .grid-inputs { grid-template-columns: 1fr; } }
        .input-group { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 8px 12px; border-radius: 6px; border: 1px solid #e0e0e0; }
        .input-group input { width: 80px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 14px; }
        
        .input-group.mineral { border: 1px solid #9b59b6; background: #faf5fc; }
        
        /* 通用卡片样式 */
        .ball-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; margin-bottom: 10px; background: #fff; border-left: 5px solid var(--primary-color); border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .ball-card.normal-ball { border-left: 5px solid #e67e22; background: #fdfaf7; }
        .ball-name { font-weight: bold; font-size: 15px; color: #2c3e50; }
        .ball-count { font-size: 20px; font-weight: bold; color: #2ea44f; }
        .ball-card.normal-ball .ball-count { color: #e67e22; }
        .ball-mats { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
        
        /* 新增：食物卡片高亮与周期标签样式 */
        .ball-card.food-card { border-left: 5px solid #27ae60; background: #f4faf6; }
        .food-badge { display: inline-block; background-color: #e8f5e9; color: #2e7d32; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 8px; }
        .food-count { font-size: 20px; font-weight: bold; color: #27ae60; }
        .food-count.zero { color: #bdc3c7; }

        .status-msg { font-size: 14px; color: #2ea44f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>洛克王国咕噜球与精灵食物计算器</h1>

    <div class="sync-panel">
        <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; width: 100%;">
            <button class="btn btn-success" onclick="shareCurrentAccountQR()">⚡ 生成极速秒扫二维码</button>
            <button class="btn" style="background-color: #34495e;" onclick="exportAllDataText()">📋 备份/复制全套超短文本</button>
            <button class="btn" style="background-color: #9b59b6;" onclick="importDataText()">📥 粘贴超短文本恢复</button>
        </div>
        <hr style="width: 100%; border: 0; border-top: 1px solid #ddd; margin: 5px 0;">
        <div>
            <label><b>👥 切换当前账号:</b> </label>
            <select id="accountSelect" onchange="switchAccount()"></select>
            <input type="text" id="accountNameInput" placeholder="自定义当前账号名" style="width: 130px;" oninput="updateAccountName()">
            <button class="btn" style="background-color: #9b59b6;" onclick="addNewAccount()">+ 添加新账号</button>
            <button class="btn btn-danger" id="deleteAccBtn" onclick="deleteCurrentAccount()">删除此号</button>
        </div>
    </div>

    <div class="main-content">
        <div>
            <div class="section-header">
                <h2 class="section-title">请输入背包原材料数量</h2>
                <button class="btn btn-clear" onclick="clearCurrentMats()">🗑️ 清空当前背包</button>
            </div>
            <div class="grid-inputs" id="matsContainer"></div>
        </div>

        <div>
            <div class="section-header">
                <h2 class="section-title">可合成咕噜球预测</h2>
            </div>
            <div id="resultsContainer"></div>
            
            <div class="section-header" style="margin-top: 25px; border-bottom: 2px solid #27ae60;">
                <h2 class="section-title" style="color: #2c3e50;">🍱 精灵食物制作预测</h2>
            </div>
            <div id="foodResultsContainer"></div>

            <div style="margin-top: 20px; text-align: right;">
                <span id="statusLabel" class="status-msg">时效与比特全闭环引擎就绪</span>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="qrModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="qrTitle">📱 手机扫码同步</h3>
        <p style="font-size: 12px; color: #555; margin-bottom: 5px;">食物逻辑为衍生计算，密文流长未变，极度好扫：</p>
        <div id="qrcode"></div>
        <br>
        <button class="btn btn-danger" onclick="closeModal()">关闭窗口</button>
    </div>
</div>

<script>
    // 咕噜球配方
    const ballFormula = {
        "光合球": ["喵喵草", "象牙花", "凤眼莲"],
        "网兜球": ["海神花", "蓝掌", "风卷草", "喷气菇"],
        "调温球": ["星霜花", "伞伞菌", "向阳花", "火焰花"],
        "美妙球": ["天使草", "雪菇", "短木莲", "荧光兰"],
        "好战球": ["睡铃", "藻羽花", "大嘴花", "海珊瑚"],
        "暗星球": ["骨片", "幽幽草", "恶魔雪茄"],
        "绝缘球": ["杏黄贝", "海桑花", "花星角", "洋红珊瑚"],
        "淘沙球": ["蜜黄菌", "石耳", "彩玉花", "幽幽鬼火"],
        "变幻球": ["流星兰", "紫雀花", "紫晶菇"]
    };

    // 精灵食物结构化核心配置 [消耗植物, 消耗基数, 食物名, 喂养周期文本]
    const foodFormula = [
        ["象牙花", 20, "象牙花甜酱", "40小时"],
        ["恶魔雪茄", 10, "恶魔雪茄布丁", "20小时"],
        ["火焰花", 6, "火焰花酱吐司", "12小时"],
        ["流星兰", 4, "流星兰汽水", "8小时"],
        ["花星角", 2, "花星角曲奇", "4小时"],
        ["蓝掌", 1, "蓝掌软糖", "2小时"],
        ["紫晶菇", 20, "紫晶菇甜酱", "40小时"],
        ["荧光兰", 10, "荧光兰布丁", "20小时"],
        ["短木莲", 6, "短木莲酱吐司", "12小时"],
        ["彩玉花", 4, "彩玉花汽水", "8小时"],
        ["海桑花", 2, "海桑花曲奇", "4小时"],
        ["睡铃", 1, "睡铃软糖", "2小时"],
        ["雪菇", 20, "雪菇甜酱", "40小时"],
        ["紫雀花", 10, "紫雀花布丁", "20小时"],
        ["大嘴花", 6, "大嘴花酱吐司", "12小时"],
        ["天使草", 4, "天使草汽水", "8小时"],
        ["海神花", 2, "海神花曲奇", "4小时"],
        ["喵喵草", 1, "喵喵草软糖", "2小时"],
        ["伞伞菌", 20, "伞伞菌甜酱", "40小时"],
        ["喷气菇", 10, "喷气菇布丁", "20小时"],
        ["幽幽草", 6, "幽幽草酱吐司", "12小时"],
        ["星霜花", 4, "星霜花汽水", "8小时"],
        ["蜜黄菌", 2, "蜜黄菌曲奇", "4小时"],
        ["向阳花", 1, "向阳花软糖", "2小时"]
    ];

    // 全物料底层序列（追加新矿物在末尾，保持编解码映射不被历史破坏）
    const allMaterials = [
        "向阳花", "喵喵草", "蓝掌", "睡铃", "天使草", "石耳", "伞伞菌", 
        "蜜黄菌", "喷气菇", "凤眼莲", "幽幽草", "星霜花", "雪菇", "骨片", 
        "花星角", "荧光兰", "大嘴花", "流星兰", "紫晶菇", "海桑花", "恶魔雪茄", 
        "火焰花", "藻羽花", "彩玉花", "象牙花", "风卷草", "海珊瑚", "海神花", 
        "幽幽鬼火", "紫雀花", "洋红珊瑚", "杏黄贝", "短木莲",
        "黑金琉璃", "黄石榴石", "蓝晶碧玺", "紫莲刚玉"
    ];

    const targetMinerals = ["黑金琉璃", "黄石榴石", "蓝晶碧玺", "紫莲刚玉"];
    
    let appData = { accounts: [{ id: "acc_" + Date.now(), name: "账号一", mats: {} }], currentId: "" };

    function createEmptyMats() {
        let mats = {}; allMaterials.forEach(m => mats[m] = 0); return mats;
    }
    appData.accounts[0].mats = createEmptyMats();
    appData.currentId = appData.accounts[0].id;

    /* ==================== 🛠️ URL 安全型高阶位流传输器 ==================== */
    function safeEncode(rawStr) {
        let base64 = btoa(encodeURIComponent(rawStr));
        return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function safeDecode(safeStr) {
        let base64 = safeStr.replace(/-/g, '+').replace(/_/g, '/');
        while (base64.length % 4) { base64 += '='; }
        return decodeURIComponent(atob(base64));
    }

    function packAccountObj(accObj) {
        let hexStream = "";
        allMaterials.forEach(matName => {
            let val = parseInt(accObj.mats[matName]) || 0;
            if (val > 255) val = 255; if (val < 0) val = 0;
            hexStream += val.toString(16).padStart(2, '0');
        });
        return `${accObj.id}|${accObj.name}|${hexStream}`;
    }

    function unpackAccountStr(accountString) {
        const parts = accountString.split('|');
        if (parts.length >= 3) {
            const accId = parts[0];
            const accName = parts[1];
            const hexStream = parts[2] || "";
            let restoredMats = createEmptyMats();
            for (let i = 0; i < allMaterials.length; i++) {
                const subHex = hexStream.substr(i * 2, 2);
                if (subHex) restoredMats[allMaterials[i]] = parseInt(subHex, 16) || 0;
            }
            return { id: accId, name: accName, mats: restoredMats };
        }
        return null;
    }

    /* ===================================================================== */

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const compactParam = urlParams.get('c');
        const localData = localStorage.getItem('lk_gist_data');
        if(localData) { try { appData = JSON.parse(localData); } catch(e){} }

        if (compactParam) {
            try {
                const decodedStr = safeDecode(compactParam);
                const incomingAccount = unpackAccountStr(decodedStr);
                if (incomingAccount) {
                    const idx = appData.accounts.findIndex(a => a.id === incomingAccount.id);
                    if (idx !== -1) appData.accounts[idx] = incomingAccount;
                    else appData.accounts.push(incomingAccount);
                    appData.currentId = incomingAccount.id;
                    saveToLocalCache();
                    window.history.replaceState({}, document.title, window.location.pathname);
                    alert(`🎉 高密闭同步：账号【${incomingAccount.name}】数据导入成功！`);
                }
            } catch(e) { alert("同步失败，解析出现异常。"); }
        }
        renderMaterialsInput();
        refreshAccountSelectUI();
    };

    function renderMaterialsInput() {
        const container = document.getElementById('matsContainer'); container.innerHTML = '';
        allMaterials.forEach(mat => {
            const div = document.createElement('div');
            const isMineral = targetMinerals.includes(mat);
            div.className = isMineral ? 'input-group mineral' : 'input-group';
            div.innerHTML = `<label>${isMineral ? '💎 ' : ''}${mat}</label><input type="number" min="0" max="255" id="mat-${mat}" value="0" oninput="onInputValueChange('${mat}')">`;
            container.appendChild(div);
        });
    }

    function getCurrentAccountObj() { return appData.accounts.find(a => a.id === appData.currentId) || appData.accounts[0]; }
    
    function onInputValueChange(matName) {
        const currentAcc = getCurrentAccountObj();
        let val = parseInt(document.getElementById(`mat-${matName}`).value) || 0;
        if(val > 255) val = 255;
        currentAcc.mats[matName] = val;
        calculateAllOutputs(); saveToLocalCache();
    }

    // 核心统一调配台
    function calculateAllOutputs() {
        const currentAcc = getCurrentAccountObj();
        
        /* 1. 咕噜球预测计算区 */
        const ballContainer = document.getElementById('resultsContainer'); ballContainer.innerHTML = '';
        let totalMineralsSum = 0;
        targetMinerals.forEach(m => { totalMineralsSum += (parseInt(currentAcc.mats[m]) || 0); });

        const normalCard = document.createElement('div');
        normalCard.className = 'ball-card normal-ball';
        normalCard.innerHTML = `<div><div class="ball-name">普通咕噜球 (新)</div><div class="ball-mats">${targetMinerals.join(' + ')}</div></div><div class="ball-count">${totalMineralsSum} 个</div>`;
        ballContainer.appendChild(normalCard);

        Object.keys(ballFormula).forEach(ball => {
            const requirements = ballFormula[ball]; let totalSum = 0;
            requirements.forEach(m => {
                let count = parseInt(currentAcc.mats[m]); if (!isNaN(count) && count > 0) totalSum += count;
            });
            const card = document.createElement('div');
            card.className = 'ball-card';
            card.innerHTML = `<div><div class="ball-name">${ball}</div><div class="ball-mats">${requirements.join(' + ')}</div></div><div class="ball-count">${totalSum} 个</div>`;
            ballContainer.appendChild(card);
        });

        /* 2. 精灵食物预测计算区 (新增) */
        const foodContainer = document.getElementById('foodResultsContainer'); foodContainer.innerHTML = '';
        foodFormula.forEach(([matName, cost, foodName, cycle]) => {
            const currentStock = parseInt(currentAcc.mats[matName]) || 0;
            // 向下取整计算出能制造多少个
            const foodCount = Math.floor(currentStock / cost);
            
            const card = document.createElement('div');
            card.className = 'ball-card food-card';
            
            card.innerHTML = `
                <div>
                    <div class="ball-name">${foodName}<span class="food-badge">⏱️ 周期: ${cycle}</span></div>
                    <div class="ball-mats">消耗: ${matName} x${cost} (库存: ${currentStock})</div>
                </div>
                <div class="food-count ${foodCount === 0 ? 'zero' : ''}">${foodCount} 份</div>
            `;
            foodContainer.appendChild(card);
        });
    }

    function refreshAccountSelectUI() {
        const select = document.getElementById('accountSelect'); select.innerHTML = '';
        appData.accounts.forEach(acc => {
            const opt = document.createElement('option'); opt.value = acc.id; opt.text = acc.name;
            if(acc.id === appData.currentId) opt.selected = true;
            select.appendChild(opt);
        });
        document.getElementById('deleteAccBtn').disabled = (appData.accounts.length <= 1);
        applyAccountDataToUI();
    }

    function switchAccount() { appData.currentId = document.getElementById('accountSelect').value; refreshAccountSelectUI(); saveToLocalCache(); }
    function updateAccountName() {
        const newName = document.getElementById('accountNameInput').value.trim();
        const currentAcc = getCurrentAccountObj(); currentAcc.name = newName || "未命名账号";
        document.getElementById('accountSelect').options[document.getElementById('accountSelect').selectedIndex].text = currentAcc.name;
        saveToLocalCache();
    }
    function addNewAccount() {
        const newAcc = { id: "acc_" + Date.now(), name: "账号 " + (appData.accounts.length + 1), mats: createEmptyMats() };
        appData.accounts.push(newAcc); appData.currentId = newAcc.id; refreshAccountSelectUI(); saveToLocalCache();
    }
    function deleteCurrentAccount() {
        if(appData.accounts.length <= 1) return;
        if(!confirm("确定要删除当前账号吗？")) return;
        appData.accounts.splice(appData.accounts.findIndex(a => a.id === appData.currentId), 1);
        appData.currentId = appData.accounts[0].id; refreshAccountSelectUI(); saveToLocalCache();
    }
    function clearCurrentMats() {
        if(!confirm("确定清空吗？")) return;
        const currentAcc = getCurrentAccountObj();
        allMaterials.forEach(m => { currentAcc.mats[m] = 0; document.getElementById(`mat-${m}`).value = 0; });
        calculateAllOutputs(); saveToLocalCache();
    }
    function applyAccountDataToUI() {
        const currentAcc = getCurrentAccountObj();
        document.getElementById('accountNameInput').value = currentAcc.name;
        allMaterials.forEach(m => { document.getElementById(`mat-${m}`).value = currentAcc.mats[m] || 0; });
        calculateAllOutputs();
    }
    function saveToLocalCache() { localStorage.setItem('lk_gist_data', JSON.stringify(appData)); }

    function shareCurrentAccountQR() {
        const currentAcc = getCurrentAccountObj();
        const compactCode = safeEncode(packAccountObj(currentAcc));
        const baseUrl = window.location.protocol + '//' + window.location.host + window.location.pathname;
        document.getElementById("qrcode").innerHTML = "";
        document.getElementById("qrTitle").innerText = `📱 同步账号: ${currentAcc.name}`;
        document.getElementById("qrModal").style.display = "flex";

        new QRCode(document.getElementById("qrcode"), {
            text: baseUrl + "?c=" + compactCode,
            width: 220, height: 220, colorDark : "#000000", colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });
    }

    function closeModal() { document.getElementById("qrModal").style.display = "none"; }

    function exportAllDataText() {
        let allPackedArray = []; appData.accounts.forEach(acc => { allPackedArray.push(packAccountObj(acc)); });
        const finalBookStr = allPackedArray.join('#');
        const ultraShortText = safeEncode(finalBookStr);
        const temp = document.createElement("textarea"); temp.value = ultraShortText; document.body.appendChild(temp);
        temp.select(); document.execCommand("copy"); document.body.removeChild(temp);
        alert("📋 【安全纯净短码】已复制！数据包含最新精灵食物与喂养周期衍生模型。");
    }

    function importDataText() {
        const code = prompt("请粘贴十六进制全本备份文本："); if(!code || code.trim() === "") return;
        try {
            const rawBookStr = safeDecode(code.trim()); const accountRawList = rawBookStr.split('#');
            let importedAccounts = []; let lastId = "";
            accountRawList.forEach(accStr => {
                const unpacked = unpackAccountStr(accStr); if (unpacked) { importedAccounts.push(unpacked); lastId = unpacked.id; }
            });
            if (importedAccounts.length > 0) {
                appData.accounts = importedAccounts; appData.currentId = lastId;
                refreshAccountSelectUI(); saveToLocalCache(); alert(`🎉 解析成功！成功还原 ${importedAccounts.length} 个账号的完整数据模型！`);
            } else { alert("文本解析失败。"); }
        } catch(e) { alert("解析失败！请确保使用的是同版本导出的密文。"); }
    }
</script>
</body>
</html>
