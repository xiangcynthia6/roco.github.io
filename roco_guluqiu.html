<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国咕噜球计算器 (GitHub 极速云同步版)</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        /* 控制面板 */
        .sync-panel {
            background: #eef5fe;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .sync-panel input, .sync-panel select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #357abd; }
        .btn-success { background-color: #2ea44f; }
        .btn-success:hover { background-color: #248a3d; }
        .btn-danger { background-color: #e05d5d; }
        .btn-danger:hover { background-color: #c74d4d; }
        .btn-clear { background-color: #f39c12; }
        .btn-clear:hover { background-color: #d68010; }

        /* 主体布局 */
        .main-content {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--primary-color);
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            margin: 0;
        }

        /* 植物输入 */
        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        @media (max-width: 480px) {
            .grid-inputs { grid-template-columns: 1fr; }
        }
        .input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .input-group input {
            width: 80px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        /* 结果卡片 */
        .ball-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 12px;
            background: #fff;
            border-left: 5px solid var(--primary-color);
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .ball-name { font-weight: bold; font-size: 16px; color: #2c3e50; }
        .ball-count { font-size: 24px; font-weight: bold; color: #2ea44f; }
        .ball-mats { font-size: 12px; color: #7f8c8d; margin-top: 5px; }
        .status-msg { font-size: 14px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>洛克王国咕噜球计算器 (GitHub 极速云同步版)</h1>

    <div class="sync-panel">
        <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; width: 100%;">
            <label><b>🔑 GitHub 专属 Token:</b> </label>
            <input type="password" id="ghToken" placeholder="粘贴您的 ghp_ 开头的 Token" style="width: 260px;" onchange="saveTokenLocal()">
            <button class="btn" style="background-color: #24292e;" onclick="loadFromGitHub()">🔄 载入/拉取云端</button>
            <button class="btn btn-success" onclick="saveToGitHub()">⚡ 一键静默推送到云端</button>
        </div>
        <hr style="width: 100%; border: 0; border-top: 1px solid #ddd; margin: 5px 0;">
        <div>
            <label><b>👥 切换当前账号:</b> </label>
            <select id="accountSelect" onchange="switchAccount()"></select>
            <input type="text" id="accountNameInput" placeholder="自定义当前账号名" style="width: 130px;" oninput="updateAccountName()">
            <button class="btn" style="background-color: #9b59b6;" onclick="addNewAccount()">+ 添加新账号</button>
            <button class="btn btn-danger" id="deleteAccBtn" onclick="deleteCurrentAccount()">删除此号</button>
        </div>
    </div>

    <div class="main-content">
        <div>
            <div class="section-header">
                <h2 class="section-title">请输入当前植物背包数量</h2>
                <button class="btn btn-clear" onclick="clearCurrentMats()">🗑️ 清空当前背包</button>
            </div>
            <div class="grid-inputs" id="matsContainer"></div>
        </div>

        <div>
            <div class="section-header">
                <h2 class="section-title">可合成咕噜球预测</h2>
            </div>
            <div id="resultsContainer"></div>
            <div style="margin-top: 20px; text-align: right;">
                <span id="statusLabel" class="status-msg">已启用本地安全缓存模式</span>
            </div>
        </div>
    </div>
</div>

<script>
    const ballFormula = {
        "光合球": ["喵喵草", "象牙花", "凤眼莲"],
        "网兜球": ["海神花", "蓝掌", "风卷草", "喷气菇"],
        "调温球": ["星霜花", "伞伞菌", "向阳花", "火焰花"],
        "美妙球": ["天使草", "雪菇", "短木莲", "荧光兰"],
        "好战球": ["睡铃", "藻羽花", "大嘴花", "海珊瑚"],
        "暗星球": ["骨片", "幽幽草", "恶魔雪茄"],
        "绝缘球": ["杏黄贝", "海桑花", "花星角", "洋红珊瑚"],
        "淘沙球": ["蜜黄菌", "石耳", "彩玉花", "幽幽鬼火"],
        "变幻球": ["流星兰", "紫雀花", "紫晶菇"]
    };

    const allMaterials = [
        "向阳花", "喵喵草", "蓝掌", "睡铃", "天使草", "石耳", "伞伞菌", 
        "蜜黄菌", "喷气菇", "凤眼莲", "幽幽草", "星霜花", "雪菇", "骨片", 
        "花星角", "荧光兰", "大嘴花", "流星兰", "紫晶菇", "海桑花", "恶魔雪茄", 
        "火焰花", "藻羽花", "彩玉花", "象牙花", "风卷草", "海珊瑚", "海神花", 
        "幽幽鬼火", "紫雀花", "洋红珊瑚", "杏黄贝", "短木莲"
    ];
    
    let appData = {
        accounts: [{ id: "acc_" + Date.now(), name: "账号一", mats: {} }],
        currentId: ""
    };

    function createEmptyMats() {
        let mats = {};
        allMaterials.forEach(m => mats[m] = 0);
        return mats;
    }
    appData.accounts[0].mats = createEmptyMats();
    appData.currentId = appData.accounts[0].id;

    window.onload = function() {
        const localData = localStorage.getItem('lk_gist_data');
        const savedToken = localStorage.getItem('lk_github_token');
        if(localData) { try { appData = JSON.parse(localData); } catch(e){} }
        if(savedToken) {
            document.getElementById('ghToken').value = savedToken;
            document.getElementById('statusLabel').innerText = "已加载本地密钥，点击【载入/拉取云端】即可同步。";
        }

        renderMaterialsInput();
        refreshAccountSelectUI();
    };

    function renderMaterialsInput() {
        const container = document.getElementById('matsContainer');
        container.innerHTML = '';
        allMaterials.forEach(mat => {
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `<label>${mat}</label><input type="number" min="0" id="mat-${mat}" value="0" oninput="onInputValueChange('${mat}')">`;
            container.appendChild(div);
        });
    }

    function getCurrentAccountObj() { return appData.accounts.find(a => a.id === appData.currentId) || appData.accounts[0]; }
    function onInputValueChange(matName) {
        const currentAcc = getCurrentAccountObj();
        currentAcc.mats[matName] = parseInt(document.getElementById(`mat-${matName}`).value) || 0;
        calculateBalls();
        saveToLocalCache();
    }

    function calculateBalls() {
        const container = document.getElementById('resultsContainer');
        container.innerHTML = '';
        const currentAcc = getCurrentAccountObj();
        Object.keys(ballFormula).forEach(ball => {
            const requirements = ballFormula[ball];
            let totalSum = 0;
            requirements.forEach(m => {
                let count = parseInt(currentAcc.mats[m]);
                if (!isNaN(count) && count > 0) totalSum += count;
            });
            const card = document.createElement('div');
            card.className = 'ball-card';
            card.innerHTML = `<div><div class="ball-name">${ball}</div><div class="ball-mats">${requirements.join(' + ')}</div></div><div class="ball-count">${totalSum} 个</div>`;
            container.appendChild(card);
        });
    }

    function refreshAccountSelectUI() {
        const select = document.getElementById('accountSelect');
        select.innerHTML = '';
        appData.accounts.forEach(acc => {
            const opt = document.createElement('option');
            opt.value = acc.id; opt.text = acc.name;
            if(acc.id === appData.currentId) opt.selected = true;
            select.appendChild(opt);
        });
        document.getElementById('deleteAccBtn').disabled = (appData.accounts.length <= 1);
        applyAccountDataToUI();
    }

    function switchAccount() { appData.currentId = document.getElementById('accountSelect').value; refreshAccountSelectUI(); saveToLocalCache(); }
    function updateAccountName() {
        const newName = document.getElementById('accountNameInput').value.trim();
        const currentAcc = getCurrentAccountObj();
        currentAcc.name = newName || "未命名账号";
        document.getElementById('accountSelect').options[document.getElementById('accountSelect').selectedIndex].text = currentAcc.name;
        saveToLocalCache();
    }
    function addNewAccount() {
        const newAcc = { id: "acc_" + Date.now(), name: "账号 " + (appData.accounts.length + 1), mats: createEmptyMats() };
        appData.accounts.push(newAcc); appData.currentId = newAcc.id; refreshAccountSelectUI(); saveToLocalCache();
    }
    function deleteCurrentAccount() {
        if(appData.accounts.length <= 1) return;
        if(!confirm("确定要删除当前账号吗？")) return;
        appData.accounts.splice(appData.accounts.findIndex(a => a.id === appData.currentId), 1);
        appData.currentId = appData.accounts[0].id; refreshAccountSelectUI(); saveToLocalCache();
    }
    function clearCurrentMats() {
        if(!confirm("确定清空吗？")) return;
        const currentAcc = getCurrentAccountObj();
        allMaterials.forEach(m => { currentAcc.mats[m] = 0; document.getElementById(`mat-${m}`).value = 0; });
        calculateBalls(); saveToLocalCache();
    }
    function applyAccountDataToUI() {
        const currentAcc = getCurrentAccountObj();
        document.getElementById('accountNameInput').value = currentAcc.name;
        allMaterials.forEach(m => { document.getElementById(`mat-${m}`).value = currentAcc.mats[m] || 0; });
        calculateBalls();
    }
    function saveToLocalCache() { localStorage.setItem('lk_gist_data', JSON.stringify(appData)); }
    function saveTokenLocal() { getCleanToken(); }

    /* ==================== ⚡ 核心逻辑：GitHub Gist 官方管道直连同步 ==================== */

    function getCleanToken() {
        const rawToken = document.getElementById('ghToken').value || "";
        const cleanToken = rawToken.trim().replace(/[^\x00-\x7F]/g, "");
        document.getElementById('ghToken').value = cleanToken;
        if (cleanToken) {
            localStorage.setItem('lk_github_token', cleanToken);
        }
        return cleanToken;
    }

    function getHeaders(token) {
        return {
            "Authorization": `token ${token}`,
            "Accept": "application/vnd.github.v3+json",
            "Content-Type": "application/json"
        };
    }

    async function findOurGist(token) {
        // 💡 针对获取列表接口也加上随机戳，保证每次找 Gist 都是最新的
        const response = await fetch(`https://api.github.com/gists?_nocache=${Date.now()}`, { headers: getHeaders(token) });
        if(!response.ok) throw new Error("Token失效或无网络权限，状态码：" + response.status);
        const gists = await response.json();
        return gists.find(g => g.files && g.files["roco_gulu_data.json"]);
    }

    // 🔄 从 GitHub 云端同步下载
    async function loadFromGitHub() {
        const token = getCleanToken();
        if(!token) return alert("请先填入您的 GitHub Token！");
        
        document.getElementById('statusLabel').innerText = "正在安全握手并拉取 GitHub 云端快照...";
        try {
            const targetGist = await findOurGist(token);
            if(!targetGist) {
                document.getElementById('statusLabel').innerText = "云端尚未激活档案，请直接点击保存按钮初始化。";
                alert("您是首次使用该Token同步！云端目前为空。请修改完数据后点击【一键静默推送到云端】即可自动激活建立车位。");
                return;
            }

            const fileUrl = targetGist.files["roco_gulu_data.json"].raw_url;
            
            // 💡 【核心修复】：在下载具体数据文件的 URL 后面，强行追加带有当前时间戳的无意义参数 `?_t=当前时间毫秒`
            // 这样能100%击碎任何手机浏览器或中间代理服务器的过期数据缓存，逼迫其下载最新内容。
            const noCacheUrl = fileUrl + (fileUrl.includes('?') ? '&' : '?') + '_t=' + Date.now();

            const fileResponse = await fetch(noCacheUrl, { headers: getHeaders(token) });
            if(fileResponse.ok) {
                const cloudData = await fileResponse.json();
                if(cloudData && cloudData.accounts) {
                    appData = cloudData;
                    appData.accounts.forEach(acc => {
                        allMaterials.forEach(m => { if(acc.mats[m] === undefined) acc.mats[m] = 0; });
                    });
                    refreshAccountSelectUI();
                    saveToLocalCache();
                    document.getElementById('statusLabel').innerText = `同步成功! 最新同步时间: ${new Date().toLocaleTimeString()}`;
                    alert("🎉 官方管道同步拉取成功！数据已更新为最新云端版本。");
                }
            }
        } catch (e) {
            alert("拉取失败：" + e.message + "\n请确保Token正确，且无断网拦截。");
            document.getElementById('statusLabel').innerText = "连接失败";
        }
    }

    // ⚡ 一键静默推送到云端
    async function saveToGitHub() {
        const token = getCleanToken();
        if(!token) return alert("请先输入您的 GitHub Token 才能启用自动同步！");

        document.getElementById('statusLabel').innerText = "正在直接向 GitHub 官方安全通道推送最新数据...";
        
        const bodyData = {
            description: "洛克王国咕噜球多账号背包云同步数据备份",
            public: false, 
            files: {
                "roco_gulu_data.json": {
                    content: JSON.stringify(appData, null, 2)
                }
            }
        };

        try {
            const targetGist = await findOurGist(token);
            let response;

            if(targetGist) {
                response = await fetch(`https://api.github.com/gists/${targetGist.id}`, {
                    method: "PATCH",
                    headers: getHeaders(token),
                    body: JSON.stringify(bodyData)
                });
            } else {
                response = await fetch("https://api.github.com/gists", {
                    method: "POST",
                    headers: getHeaders(token),
                    body: JSON.stringify(bodyData)
                });
            }

            if(response.ok) {
                saveToLocalCache();
                document.getElementById('statusLabel').innerText = `云端备份成功! 刷新时刻: ${new Date().toLocaleTimeString()}`;
                alert("🚀 一键推送大成功！\n数据已保存到你个人的私密代码片段中。");
            } else {
                alert("GitHub 拒绝了写入请求，错误码：" + response.status);
            }
        } catch (e) {
            alert("传输阻断：" + e.message);
            document.getElementById('statusLabel').innerText = "推送失败";
        }
    }
</script>
</body>
</html>
