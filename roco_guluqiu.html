<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国咕噜球计算器</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        /* 同步与多账号控制面板 */
        .sync-panel {
            background: #eef5fe;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .sync-panel input, .sync-panel select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #357abd; }
        .btn-success { background-color: #2ea44f; }
        .btn-success:hover { background-color: #248a3d; }
        .btn-danger { background-color: #e05d5d; }
        .btn-danger:hover { background-color: #c74d4d; }
        .btn-clear { background-color: #f39c12; }
        .btn-clear:hover { background-color: #d68010; }

        /* 备用纯文本同步面板样式 */
        .backup-area {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            width: 100%;
            box-sizing: border-box;
        }
        .backup-area textarea {
            width: 100%;
            height: 60px;
            margin-top: 10px;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            box-sizing: border-box;
            resize: vertical;
        }

        /* 主体布局 */
        .main-content {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--primary-color);
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            margin: 0;
        }

        /* 植物输入双列布局 */
        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        @media (max-width: 480px) {
            .grid-inputs { grid-template-columns: 1fr; }
        }
        .input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .input-group label {
            font-size: 14px;
            color: #555;
        }
        .input-group input {
            width: 80px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        /* 右侧结果卡片样式 */
        .ball-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 12px;
            background: #fff;
            border-left: 5px solid var(--primary-color);
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .ball-name { font-weight: bold; font-size: 16px; color: #2c3e50; }
        .ball-count {
            font-size: 24px;
            font-weight: bold;
            color: #2ea44f;
        }
        .ball-mats {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        .status-msg {
            font-size: 14px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>洛克王国咕噜球计算器</h1>

    <div class="sync-panel">
        <div>
            <label><b>1. 选择账号:</b> </label>
            <select id="accountSelect" onchange="switchAccount()"></select>
            <input type="text" id="accountNameInput" placeholder="自定义当前账号名" style="width: 130px;" oninput="updateAccountName()">
            <button class="btn" style="background-color: #9b59b6;" onclick="addNewAccount()">+ 添加新账号</button>
            <button class="btn btn-danger" id="deleteAccBtn" onclick="deleteCurrentAccount()">删除此号</button>
        </div>
        <div style="margin-left: auto; display: flex; gap: 8px;">
            <input type="text" id="userEmail" placeholder="输入同步暗号" style="width: 120px;">
            <button class="btn" onclick="loadFromCloud()">云端同步</button>
            <button class="btn btn-success" onclick="saveToCloud()">云端保存</button>
        </div>
    </div>

    <div class="backup-area">
        <label style="color: #856404; font-weight: bold;">⚠️ 无论网络有无报错，均可在此处生成/粘贴“同步代码块”实现手动秒级跨端互通：</label>
        <textarea id="backupTextarea" placeholder="在这里点击【生成当前全账号备份】，或者把另一台设备生成的代码粘贴到这里点击【导入全账号备份】..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background-color: #e67e22;" onclick="generateBackupCode()">📋 生成当前全账号备份代码</button>
            <button class="btn" style="background-color: #2c3e50;" onclick="importBackupCode()">📥 导入框内备份并覆盖本地</button>
        </div>
    </div>

    <div class="main-content">
        <div>
            <div class="section-header">
                <h2 class="section-title">请输入当前植物背包数量</h2>
                <button class="btn btn-clear" onclick="clearCurrentMats()">🗑️ 清空当前背包</button>
            </div>
            <div class="grid-inputs" id="matsContainer"></div>
        </div>

        <div>
            <div class="section-header">
                <h2 class="section-title">可合成咕噜球预测</h2>
            </div>
            <div id="resultsContainer"></div>
            <div style="margin-top: 20px; text-align: right;">
                <span id="statusLabel" class="status-msg">已启用本地安全缓存模式</span>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://b64kv.deno.dev";

    const ballFormula = {
        "光合球": ["喵喵草", "象牙花", "凤眼莲"],
        "网兜球": ["海神花", "蓝掌", "风卷草", "喷气菇"],
        "调温球": ["星霜花", "伞伞菌", "向阳花", "火焰花"],
        "美妙球": ["天使草", "雪菇", "短木莲", "荧光兰"],
        "好战球": ["睡铃", "藻羽花", "大嘴花", "海珊瑚"],
        "暗星球": ["骨片", "幽幽草", "恶魔雪茄"],
        "绝缘球": ["杏黄贝", "海桑花", "花星角", "洋红珊瑚"],
        "淘沙球": ["蜜黄菌", "石耳", "彩玉花", "幽幽鬼火"],
        "变幻球": ["流星兰", "紫雀花", "紫晶菇"]
    };

    const allMaterials = [
        "向阳花", "喵喵草", "蓝掌", "睡铃", "天使草", "石耳", "伞伞菌", 
        "蜜黄菌", "喷气菇", "凤眼莲", "幽幽草", "星霜花", "雪菇", "骨片", 
        "花星角", "荧光兰", "大嘴花", "流星兰", "紫晶菇", "海桑花", "恶魔雪茄", 
        "火焰花", "藻羽花", "彩玉花", "象牙花", "风卷草", "海珊瑚", "海神花", 
        "幽幽鬼火", "紫雀花", "洋红珊瑚", "杏黄贝", "短木莲"
    ];
    
    let appData = {
        accounts: [
            { id: "acc_" + Date.now(), name: "账号一", mats: {} }
        ],
        currentId: ""
    };

    function createEmptyMats() {
        let mats = {};
        allMaterials.forEach(m => mats[m] = 0);
        return mats;
    }
    appData.accounts[0].mats = createEmptyMats();
    appData.currentId = appData.accounts[0].id;

    window.onload = function() {
        const localData = localStorage.getItem('lk_v9_data');
        const localEmail = localStorage.getItem('lk_v9_email');
        if(localData) {
            try { appData = JSON.parse(localData); } catch(e){}
        }
        if(localEmail) document.getElementById('userEmail').value = localEmail;

        renderMaterialsInput();
        refreshAccountSelectUI();
    };

    function renderMaterialsInput() {
        const container = document.getElementById('matsContainer');
        container.innerHTML = '';
        allMaterials.forEach(mat => {
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `<label>${mat}</label><input type="number" min="0" id="mat-${mat}" value="0" oninput="onInputValueChange('${mat}')">`;
            container.appendChild(div);
        });
    }

    function getCurrentAccountObj() {
        return appData.accounts.find(a => a.id === appData.currentId) || appData.accounts[0];
    }

    function onInputValueChange(matName) {
        const currentAcc = getCurrentAccountObj();
        currentAcc.mats[matName] = parseInt(document.getElementById(`mat-${matName}`).value) || 0;
        calculateBalls();
        saveToLocalCache();
    }

    function calculateBalls() {
        const container = document.getElementById('resultsContainer');
        container.innerHTML = '';
        const currentAcc = getCurrentAccountObj();

        Object.keys(ballFormula).forEach(ball => {
            const requirements = ballFormula[ball];
            let totalSum = 0;
            requirements.forEach(m => {
                let count = parseInt(currentAcc.mats[m]);
                if (!isNaN(count) && count > 0) totalSum += count;
            });

            const card = document.createElement('div');
            card.className = 'ball-card';
            card.innerHTML = `
                <div>
                    <div class="ball-name">${ball}</div>
                    <div class="ball-mats">${requirements.join(' + ')}</div>
                </div>
                <div class="ball-count">${totalSum} 个</div>
            `;
            container.appendChild(card);
        });
    }

    function refreshAccountSelectUI() {
        const select = document.getElementById('accountSelect');
        select.innerHTML = '';
        appData.accounts.forEach(acc => {
            const opt = document.createElement('option');
            opt.value = acc.id; opt.text = acc.name;
            if(acc.id === appData.currentId) opt.selected = true;
            select.appendChild(opt);
        });
        document.getElementById('deleteAccBtn').disabled = (appData.accounts.length <= 1);
        applyAccountDataToUI();
    }

    function switchAccount() {
        appData.currentId = document.getElementById('accountSelect').value;
        applyAccountDataToUI();
        saveToLocalCache();
    }

    function updateAccountName() {
        const newName = document.getElementById('accountNameInput').value.trim();
        const currentAcc = getCurrentAccountObj();
        currentAcc.name = newName || "未命名账号";
        const select = document.getElementById('accountSelect');
        select.options[select.selectedIndex].text = currentAcc.name;
        saveToLocalCache();
    }

    function addNewAccount() {
        const num = appData.accounts.length + 1;
        const newAcc = { id: "acc_" + Date.now(), name: "账号 " + num, mats: createEmptyMats() };
        appData.accounts.push(newAcc);
        appData.currentId = newAcc.id;
        refreshAccountSelectUI();
        saveToLocalCache();
    }

    function deleteCurrentAccount() {
        if(appData.accounts.length <= 1) return;
        if(!confirm("确定要删除当前账号及所有背包数据吗？")) return;
        const index = appData.accounts.findIndex(a => a.id === appData.currentId);
        appData.accounts.splice(index, 1);
        appData.currentId = appData.accounts[0].id;
        refreshAccountSelectUI();
        saveToLocalCache();
    }

    function clearCurrentMats() {
        if(!confirm("确定要将当前账号的所有植物数量清空为 0 吗？")) return;
        const currentAcc = getCurrentAccountObj();
        allMaterials.forEach(m => {
            currentAcc.mats[m] = 0;
            document.getElementById(`mat-${m}`).value = 0;
        });
        calculateBalls();
        saveToLocalCache();
    }

    function applyAccountDataToUI() {
        const currentAcc = getCurrentAccountObj();
        document.getElementById('accountNameInput').value = currentAcc.name;
        allMaterials.forEach(m => {
            document.getElementById(`mat-${m}`).value = currentAcc.mats[m] || 0;
        });
        calculateBalls();
    }

    function saveToLocalCache() {
        localStorage.setItem('lk_v9_data', JSON.stringify(appData));
    }

    /* ================= 🌟 方案：万能离线文本数据备份互通模块（100%成功率） ================= */
    
    // 生成当前多账号数据的纯文本备份块
    function generateBackupCode() {
        try {
            const dataStr = JSON.stringify(appData);
            // 采用标准 Base64 加密压缩保护，防止复制时乱码
            const encodedData = btoa(encodeURIComponent(dataStr));
            document.getElementById('backupTextarea').value = encodedData;
            document.getElementById('backupTextarea').select();
            document.execCommand('copy'); // 自动帮忙复制到剪贴板
            document.getElementById('statusLabel').innerText = "多账号数据已打包并自动复制到系统剪贴板！";
            alert("打包成功且已自动复制！\n你可以直接去微信、QQ或备忘录里粘贴发送给另外一台设备。");
        } catch (e) {
            alert("生成备份时遇到未知异常");
        }
    }

    // 从框内读取外部多账号文本覆盖本地
    function importBackupCode() {
        const rawCode = document.getElementById('backupTextarea').value.trim();
        if(!rawCode) return alert("请先将另一台设备生成的长串加密代码粘贴进黄色框内！");
        
        if(!confirm("确定要导入此备份吗？这将会【完全覆盖】当前设备上的所有账号数据！")) return;

        try {
            const decodedStr = decodeURIComponent(atob(rawCode));
            const parsedData = JSON.parse(decodedStr);
            
            if(parsedData && parsedData.accounts && parsedData.accounts.length > 0) {
                appData = parsedData;
                // 自动合并缺失的植物包完整字段
                appData.accounts.forEach(acc => {
                    allMaterials.forEach(m => { if(acc.mats[m] === undefined) acc.mats[m] = 0; });
                });
                
                refreshAccountSelectUI();
                saveToLocalCache();
                document.getElementById('backupTextarea').value = "";
                document.getElementById('statusLabel').innerText = "本地全账号背包已被文本成功覆盖！";
                alert("🎉 导入覆盖大成功！所有多账号和植物数字已瞬间加载完毕！");
            } else {
                alert("导入失败：备份数据格式不正确！");
            }
        } catch (e) {
            alert("导入失败：代码可能不完整或在复制传输中被损毁，请重新复制。");
        }
    }

    /* ================= 以下为原云端模块（保留作为多轨参考） ================= */
    function getCloudKey(email) { return "roco_gulu_" + btoa(encodeURIComponent(email)).replace(/=/g, "").toLowerCase(); }

    async function loadFromCloud() {
        const email = document.getElementById('userEmail').value.trim();
        if(!email) return alert("请输入暗号！");
        const ck = getCloudKey(email);
        try {
            const response = await fetch(`${API_BASE}/get?key=${ck}&_cache=${Date.now()}`);
            if(response.ok) {
                const resJson = await response.json();
                if(resJson && resJson.data) {
                    appData = JSON.parse(resJson.data);
                    refreshAccountSelectUI();
                    localStorage.setItem('lk_v9_email', email);
                    saveToLocalCache();
                    alert("云端同步拉取成功！");
                    return;
                }
            }
            alert("该暗号在云端尚无记录，可在本设备点保存激活。");
        } catch (e) {
            alert("云端同步失败：检测到当前设备网络拦截了外部CORS通道。请直接使用下方【黄色区域文本备份】实现无缝互联！");
        }
    }

    async function saveToCloud() {
        const email = document.getElementById('userEmail').value.trim();
        if(!email) return alert("请输入暗号！");
        const ck = getCloudKey(email);
        try {
            const response = await fetch(`${API_BASE}/set`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: ck, data: JSON.stringify(appData) })
            });
            if(response.ok) {
                localStorage.setItem('lk_v9_email', email);
                saveToLocalCache();
                alert("云端保存成功！");
            } else { alert("网关拒绝写入"); }
        } catch (e) {
            alert("云端保存失败，请直接使用下方【黄色区域文本备份】进行零网络阻碍的100%成功数据互通！");
        }
    }
</script>
</body>
</html>
