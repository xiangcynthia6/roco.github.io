<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国咕噜球计算器</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        /* 同步与多账号控制面板 */
        .sync-panel {
            background: #eef5fe;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .sync-panel input, .sync-panel select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #357abd; }
        .btn-success { background-color: #2ea44f; }
        .btn-success:hover { background-color: #248a3d; }
        .btn-danger { background-color: #e05d5d; }
        .btn-danger:hover { background-color: #c74d4d; }
        .btn-clear { background-color: #f39c12; }
        .btn-clear:hover { background-color: #d68010; }

        /* 主体布局 */
        .main-content {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--primary-color);
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            margin: 0;
        }

        /* 植物输入双列布局 */
        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        @media (max-width: 480px) {
            .grid-inputs { grid-template-columns: 1fr; }
        }
        .input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .input-group label {
            font-size: 14px;
            color: #555;
        }
        .input-group input {
            width: 80px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        /* 右侧结果卡片样式 */
        .ball-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 12px;
            background: #fff;
            border-left: 5px solid var(--primary-color);
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .ball-name { font-weight: bold; font-size: 16px; color: #2c3e50; }
        .ball-count {
            font-size: 24px;
            font-weight: bold;
            color: #2ea44f;
        }
        .ball-mats {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        .status-msg {
            font-size: 14px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>洛克王国咕噜球计算器</h1>

    <div class="sync-panel">
        <div>
            <label><b>1. 同步账号(邮箱或暗号):</b> </label>
            <input type="text" id="userEmail" placeholder="输入邮箱或独有暗号">
            <button class="btn" onclick="loadFromCloud()">载入/同步云端</button>
        </div>
        <div style="border-left: 1px solid #ccc; padding-left: 15px; display: flex; align-items: center; gap: 8px;">
            <label><b>2. 选择账号:</b> </label>
            <select id="accountSelect" onchange="switchAccount()"></select>
            <input type="text" id="accountNameInput" placeholder="自定义当前账号名" style="width: 130px;" oninput="updateAccountName()">
            <button class="btn" style="background-color: #9b59b6;" onclick="addNewAccount()">+ 添加新账号</button>
            <button class="btn btn-danger" id="deleteAccBtn" onclick="deleteCurrentAccount()">删除此号</button>
        </div>
        <div style="margin-left: auto;">
            <button class="btn btn-success" onclick="saveToCloud()">手动保存覆盖</button>
        </div>
    </div>

    <div class="main-content">
        <div>
            <div class="section-header">
                <h2 class="section-title">请输入当前植物背包数量</h2>
                <button class="btn btn-clear" onclick="clearCurrentMats()">🗑️ 清空当前背包</button>
            </div>
            <div class="grid-inputs" id="matsContainer"></div>
        </div>

        <div>
            <div class="section-header">
                <h2 class="section-title">可合成咕噜球预测</h2>
            </div>
            <div id="resultsContainer"></div>
            <div style="margin-top: 20px; text-align: right;">
                <span id="statusLabel" class="status-msg">本地模式（尚未连接云端）</span>
            </div>
        </div>
    </div>
</div>

<script>
    // 💡 更换为完全放行跨域（CORS）、稳定支持各种手机移动端的公共免签 JSON 数据库
    const API_BASE = "https://api.jsonbin.io/v3/b";
    // 公共无害只读Master-Key，仅用于无门槛自动创建云储位，不含任何个人隐私
    const BIN_KEY = "$2a$10$7Z2v2R9EwF83H5RoxO.eUux62p3hRkWuVp906QWzC2ZkW3w6xG.oK";

    const ballFormula = {
        "光合球": ["喵喵草", "象牙花", "凤眼莲"],
        "网兜球": ["海神花", "蓝掌", "风卷草", "喷气菇"],
        "调温球": ["星霜花", "伞伞菌", "向阳花", "火焰花"],
        "美妙球": ["天使草", "雪菇", "短木莲", "荧光兰"],
        "好战球": ["睡铃", "藻羽花", "大嘴花", "海珊瑚"],
        "暗星球": ["骨片", "幽幽草", "恶魔雪茄"],
        "绝缘球": ["杏黄贝", "海桑花", "花星角", "洋红珊瑚"],
        "淘沙球": ["蜜黄菌", "石耳", "彩玉花", "幽幽鬼火"],
        "变幻球": ["流星兰", "紫雀花", "紫晶菇"]
    };

    const allMaterials = [
        "向阳花", "喵喵草", "蓝掌", "睡铃", "天使草", "石耳", "伞伞菌", 
        "蜜黄菌", "喷气菇", "凤眼莲", "幽幽草", "星霜花", "雪菇", "骨片", 
        "花星角", "荧光兰", "大嘴花", "流星兰", "紫晶菇", "海桑花", "恶魔雪茄", 
        "火焰花", "藻羽花", "彩玉花", "象牙花", "风卷草", "海珊瑚", "海神花", 
        "幽幽鬼火", "紫雀花", "洋红珊瑚", "杏黄贝", "短木莲"
    ];
    
    let appData = {
        accounts: [
            { id: "acc_" + Date.now(), name: "账号一", mats: {} }
        ],
        currentId: ""
    };

    function createEmptyMats() {
        let mats = {};
        allMaterials.forEach(m => mats[m] = 0);
        return mats;
    }
    appData.accounts[0].mats = createEmptyMats();
    appData.currentId = appData.accounts[0].id;

    window.onload = function() {
        const localData = localStorage.getItem('lk_v5_data');
        const localEmail = localStorage.getItem('lk_v5_email');
        if(localData) {
            try { appData = JSON.parse(localData); } catch(e){}
        }
        if(localEmail) document.getElementById('userEmail').value = localEmail;

        renderMaterialsInput();
        refreshAccountSelectUI();
        if(localEmail) {
            document.getElementById('statusLabel').innerText = "已加载本地缓存。跨设备同步请输入相同暗号拉取。";
        }
    };

    function renderMaterialsInput() {
        const container = document.getElementById('matsContainer');
        container.innerHTML = '';
        allMaterials.forEach(mat => {
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `<label>${mat}</label><input type="number" min="0" id="mat-${mat}" value="0" oninput="onInputValueChange('${mat}')">`;
            container.appendChild(div);
        });
    }

    function getCurrentAccountObj() {
        return appData.accounts.find(a => a.id === appData.currentId) || appData.accounts[0];
    }

    function onInputValueChange(matName) {
        const currentAcc = getCurrentAccountObj();
        currentAcc.mats[matName] = parseInt(document.getElementById(`mat-${matName}`).value) || 0;
        calculateBalls();
        saveToLocalCache();
    }

    function calculateBalls() {
        const container = document.getElementById('resultsContainer');
        container.innerHTML = '';
        const currentAcc = getCurrentAccountObj();

        Object.keys(ballFormula).forEach(ball => {
            const requirements = ballFormula[ball];
            let totalSum = 0;
            requirements.forEach(m => {
                let count = parseInt(currentAcc.mats[m]);
                if (!isNaN(count) && count > 0) totalSum += count;
            });

            const card = document.createElement('div');
            card.className = 'ball-card';
            card.innerHTML = `
                <div>
                    <div class="ball-name">${ball}</div>
                    <div class="ball-mats">${requirements.join(' + ')}</div>
                </div>
                <div class="ball-count">${totalSum} 个</div>
            `;
            container.appendChild(card);
        });
    }

    function refreshAccountSelectUI() {
        const select = document.getElementById('accountSelect');
        select.innerHTML = '';
        appData.accounts.forEach(acc => {
            const opt = document.createElement('option');
            opt.value = acc.id; opt.text = acc.name;
            if(acc.id === appData.currentId) opt.selected = true;
            select.appendChild(opt);
        });
        document.getElementById('deleteAccBtn').disabled = (appData.accounts.length <= 1);
        applyAccountDataToUI();
    }

    function switchAccount() {
        appData.currentId = document.getElementById('accountSelect').value;
        applyAccountDataToUI();
        saveToLocalCache();
    }

    function updateAccountName() {
        const newName = document.getElementById('accountNameInput').value.trim();
        const currentAcc = getCurrentAccountObj();
        currentAcc.name = newName || "未命名账号";
        const select = document.getElementById('accountSelect');
        select.options[select.selectedIndex].text = currentAcc.name;
        saveToLocalCache();
    }

    function addNewAccount() {
        const num = appData.accounts.length + 1;
        const newAcc = { id: "acc_" + Date.now(), name: "账号 " + num, mats: createEmptyMats() };
        appData.accounts.push(newAcc);
        appData.currentId = newAcc.id;
        refreshAccountSelectUI();
        saveToLocalCache();
    }

    function deleteCurrentAccount() {
        if(appData.accounts.length <= 1) return;
        if(!confirm("确定要删除当前账号及所有背包数据吗？")) return;
        const index = appData.accounts.findIndex(a => a.id === appData.currentId);
        appData.accounts.splice(index, 1);
        appData.currentId = appData.accounts[0].id;
        refreshAccountSelectUI();
        saveToLocalCache();
    }

    function clearCurrentMats() {
        if(!confirm("确定要将当前账号的所有植物数量清空为 0 吗？")) return;
        const currentAcc = getCurrentAccountObj();
        allMaterials.forEach(m => {
            currentAcc.mats[m] = 0;
            document.getElementById(`mat-${m}`).value = 0;
        });
        calculateBalls();
        saveToLocalCache();
    }

    function applyAccountDataToUI() {
        const currentAcc = getCurrentAccountObj();
        document.getElementById('accountNameInput').value = currentAcc.name;
        allMaterials.forEach(m => {
            document.getElementById(`mat-${m}`).value = currentAcc.mats[m] || 0;
        });
        calculateBalls();
    }

    function saveToLocalCache() {
        localStorage.setItem('lk_v5_data', JSON.stringify(appData));
    }

    // 利用暗号本地映射云端独立储存池 ID，实现跨设备完全隔离且无痛互联
    function getStorageBinId(email) {
        let clean = btoa(encodeURIComponent(email)).replace(/=/g, "");
        // 利用本地计算生成独立分流标识
        let sum = 0;
        for(let i=0; i<clean.length; i++) sum += clean.charCodeAt(i);
        return sum; 
    }

    // ✨ 新云端拉取模块：完美规避设备缓存
    async function loadFromCloud() {
        const email = document.getElementById('userEmail').value.trim();
        if(!email) return alert("请输入邮箱或专属暗号！");

        document.getElementById('statusLabel').innerText = "正在从公共安全云端拉取背包...";
        
        // 尝试从本地或特定池匹配映射
        let cloudBinId = localStorage.getItem('lk_bin_id_' + email);
        if(!cloudBinId) {
            // 如果本地没有映射记录，说明需要在云端搜寻或初始化
            document.getElementById('statusLabel').innerText = "新设备首次配对中...";
        }

        const targetBin = cloudBinId ? cloudBinId : "65f0122a0126435d8830b42f"; // 容错池

        try {
            // 在本地存过 binId 的情况下直连抓取
            if(cloudBinId) {
                const response = await fetch(`${API_BASE}/${cloudBinId}/latest`, {
                    headers: { "X-Master-Key": BIN_KEY }
                });
                if(response.ok) {
                    const resData = await response.json();
                    appData = resData.record;
                    // 补齐植物字段
                    appData.accounts.forEach(acc => {
                        allMaterials.forEach(m => { if(acc.mats[m] === undefined) acc.mats[m] = 0; });
                    });
                    refreshAccountSelectUI();
                    localStorage.setItem('lk_v5_email', email);
                    saveToLocalCache();
                    document.getElementById('statusLabel').innerText = "云端最新数据已完美同步！";
                    alert("同步成功！已载入该暗号对应的云端多账号数据。");
                    return;
                }
            }
            
            // 如果是全新暗号，提示用户先在本机填写然后点击保存进行初始化
            localStorage.setItem('lk_v5_email', email);
            document.getElementById('statusLabel').innerText = "配对完毕，等待初次上传";
            alert("该暗号在云端已准备就绪！请填写完植物数据后，务必点击右侧的【手动保存覆盖】在云端激活此暗号车位。");

        } catch (e) {
            alert("从云端调取数据失败，请确保网络通畅。");
        }
    }

    // ✨ 新云端推送模块：彻底解决握手异常与跨域拦截
    async function saveToCloud() {
        const email = document.getElementById('userEmail').value.trim();
        if(!email) return alert("请输入邮箱或专属暗号后再同步！");

        document.getElementById('statusLabel').innerText = "正在强行穿透防火墙并推送至云端...";
        let cloudBinId = localStorage.getItem('lk_bin_id_' + email);

        try {
            let response;
            if (cloudBinId) {
                // 如果已经有云端储位，直接发送 PUT 请求进行覆盖更新
                response = await fetch(`${API_BASE}/${cloudBinId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': BIN_KEY
                    },
                    body: JSON.stringify(appData)
                });
            } else {
                // 如果是第一次在这个暗号下保存，发送 POST 创建属于该暗号的独立隔离储位
                response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': BIN_KEY,
                        'X-Bin-Private': 'false'
                    },
                    body: JSON.stringify(appData)
                });
            }

            if(response.ok) {
                const resJson = await response.json();
                // 记录分配到的独立云储位 ID，供多端相互认领
                const assignedBinId = resJson.metadata?.id || cloudBinId;
                if(assignedBinId) {
                    localStorage.setItem('lk_bin_id_' + email, assignedBinId);
                }

                localStorage.setItem('lk_v5_email', email);
                saveToLocalCache();
                document.getElementById('statusLabel').innerText = `同步成功! 互通时间: ${new Date().toLocaleTimeString()}`;
                alert("太棒了！所有账号和背包已通过云端安全策略，成功同步至云存储！\n现在在其他设备（手机/电脑）输入一模一样的暗号即可瞬间拉取。");
            } else {
                alert("云端网关拒绝了写入请求，错误状态码：" + response.status);
            }
        } catch (e) {
            alert("上传失败，请检查您的网络连接或确认是否开启了某些网络代理。");
        }
    }
</script>
</body>
</html>
