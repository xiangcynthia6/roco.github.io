<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国咕噜球计算器 (100%无网本地同步版)</title>
    <!-- 引入官方轻量级二维码生成插件，放心，这个国内cdn手机绝对能加载 -->
    <script src="https://cdn.staticfile.org/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; --card-bg: #ffffff; --text-color: #333; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1100px; width: 100%; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 30px; }
        .sync-panel { background: #eef5fe; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        .sync-panel input, .sync-panel select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .btn { Liquor: #4a90e2; background-color: var(--primary-color); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn:hover { background-color: #357abd; }
        .btn-success { background-color: #2ea44f; }
        .btn-success:hover { background-color: #248a3d; }
        .btn-danger { background-color: #e05d5d; }
        .btn-danger:hover { background-color: #c74d4d; }
        .btn-clear { background-color: #f39c12; }
        .btn-clear:hover { background-color: #d68010; }
        
        /* 弹出层样式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; text-align: center; max-width: 90%; width: 400px; }
        #qrcode { display: inline-block; margin: 15px 0; }
        #qrcode img { margin: 0 auto; }

        .main-content { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid var(--primary-color); }
        .section-title { font-size: 18px; font-weight: bold; color: #444; margin: 0; }
        .grid-inputs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (max-width: 480px) { .grid-inputs { grid-template-columns: 1fr; } }
        .input-group { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 8px 12px; border-radius: 6px; border: 1px solid #e0e0e0; }
        .input-group input { width: 80px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 14px; }
        .ball-card { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; margin-bottom: 12px; background: #fff; border-left: 5px solid var(--primary-color); border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .ball-name { font-weight: bold; font-size: 16px; color: #2c3e50; }
        .ball-count { font-size: 24px; font-weight: bold; color: #2ea44f; }
        .ball-mats { font-size: 12px; color: #7f8c8d; margin-top: 5px; }
        .status-msg { font-size: 14px; color: #2ea44f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>洛克王国咕噜球计算器 (100%免网硬核版)</h1>

    <!-- 顶栏：同步主控面板 -->
    <div class="sync-panel">
        <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; width: 100%;">
            <button class="btn btn-success" onclick="generateSyncQR()">📱 电脑端：生成同步二维码</button>
            <button class="btn" style="background-color: #34495e;" onclick="exportTextCode()">📋 导出/复制加密文本</button>
            <button class="btn" style="background-color: #9b59b6;" onclick="importTextCode()">📥 手机端：粘贴文本载入</button>
        </div>
        <hr style="width: 100%; border: 0; border-top: 1px solid #ddd; margin: 5px 0;">
        <div>
            <label><b>👥 切换当前账号:</b> </label>
            <select id="accountSelect" onchange="switchAccount()"></select>
            <input type="text" id="accountNameInput" placeholder="自定义当前账号名" style="width: 130px;" oninput="updateAccountName()">
            <button class="btn" style="background-color: #9b59b6;" onclick="addNewAccount()">+ 添加新账号</button>
            <button class="btn btn-danger" id="deleteAccBtn" onclick="deleteCurrentAccount()">删除此号</button>
        </div>
    </div>

    <!-- 主体布局 -->
    <div class="main-content">
        <div>
            <div class="section-header">
                <h2 class="section-title">请输入当前植物背包数量</h2>
                <button class="btn btn-clear" onclick="clearCurrentMats()">🗑️ 清空当前背包</button>
            </div>
            <div class="grid-inputs" id="matsContainer"></div>
        </div>

        <div>
            <div class="section-header">
                <h2 class="section-title">可合成咕噜球预测</h2>
            </div>
            <div id="resultsContainer"></div>
            <div style="margin-top: 20px; text-align: right;">
                <span id="statusLabel" class="status-msg">安全本地离线运行中</span>
            </div>
        </div>
    </div>
</div>

<!-- 二维码弹出层 -->
<div class="modal" id="qrModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>📱 手机扫码同步</h3>
        <p style="font-size: 13px; color: #666;">请用手机微信、相机或浏览器自带扫码功能扫描下方二维码，即可直接在手机上打开并同步全部数据！</p>
        <div id="qrcode"></div>
        <br>
        <button class="btn btn-danger" onclick="closeModal()">关闭窗口</button>
    </div>
</div>

<script>
    const ballFormula = {
        "光合球": ["喵喵草", "象牙花", "凤眼莲"],
        "网兜球": ["海神花", "蓝掌", "风卷草", "喷气菇"],
        "调温球": ["星霜花", "伞伞菌", "向阳花", "火焰花"],
        "美妙球": ["天使草", "雪菇", "短木莲", "荧光兰"],
        "好战球": ["睡铃", "藻羽花", "大嘴花", "海珊瑚"],
        "暗星球": ["骨片", "幽幽草", "恶魔雪茄"],
        "绝缘球": ["杏黄贝", "海桑花", "花星角", "洋红珊瑚"],
        "淘沙球": ["蜜黄菌", "石耳", "彩玉花", "幽幽鬼火"],
        "变幻球": ["流星兰", "紫雀花", "紫晶菇"]
    };

    const allMaterials = [
        "向阳花", "喵喵草", "蓝掌", "睡铃", "天使草", "石耳", "伞伞菌", 
        "蜜黄菌", "喷气菇", "凤眼莲", "幽幽草", "星霜花", "雪菇", "骨片", 
        "花星角", "荧光兰", "大嘴花", "流星兰", "紫晶菇", "海桑花", "恶魔雪茄", 
        "火焰花", "藻羽花", "彩玉花", "象牙花", "风卷草", "海珊瑚", "海神花", 
        "幽幽鬼火", "紫雀花", "洋红珊瑚", "杏黄贝", "短木莲"
    ];
    
    let appData = { accounts: [{ id: "acc_" + Date.now(), name: "账号一", mats: {} }], currentId: "" };

    function createEmptyMats() {
        let mats = {}; allMaterials.forEach(m => mats[m] = 0); return mats;
    }
    appData.accounts[0].mats = createEmptyMats();
    appData.currentId = appData.accounts[0].id;

    let qrHandler = null;

    window.onload = function() {
        // 💡 自动解析 URL 参数里的同步数据（为了实现扫码直接读取）
        const urlParams = new URLSearchParams(window.location.search);
        const codeParam = urlParams.get('d');
        
        if (codeParam) {
            try {
                const rawStr = decodeURIComponent(atob(codeParam));
                const decryptedData = JSON.parse(rawStr);
                if (decryptedData && decryptedData.accounts) {
                    appData = decryptedData;
                    saveToLocalCache();
                    // 清除 URL 里的长后缀，保持地址栏干净
                    window.history.replaceState({}, document.title, window.location.pathname);
                    alert("🎉 扫描二维码识别成功！全账号数据已在手机端完美同步！");
                }
            } catch(e) { console.log("URL数据流解析失败"); }
        } else {
            const localData = localStorage.getItem('lk_gist_data');
            if(localData) { try { appData = JSON.parse(localData); } catch(e){} }
        }

        renderMaterialsInput();
        refreshAccountSelectUI();
    };

    function renderMaterialsInput() {
        const container = document.getElementById('matsContainer');
        container.innerHTML = '';
        allMaterials.forEach(mat => {
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `<label>${mat}</label><input type="number" min="0" id="mat-${mat}" value="0" oninput="onInputValueChange('${mat}')">`;
            container.appendChild(div);
        });
    }

    function getCurrentAccountObj() { return appData.accounts.find(a => a.id === appData.currentId) || appData.accounts[0]; }
    function onInputValueChange(matName) {
        const currentAcc = getCurrentAccountObj();
        currentAcc.mats[matName] = parseInt(document.getElementById(`mat-${matName}`).value) || 0;
        calculateBalls();
        saveToLocalCache();
    }

    function calculateBalls() {
        const container = document.getElementById('resultsContainer');
        container.innerHTML = '';
        const currentAcc = getCurrentAccountObj();
        Object.keys(ballFormula).forEach(ball => {
            const requirements = ballFormula[ball];
            let totalSum = 0;
            requirements.forEach(m => {
                let count = parseInt(currentAcc.mats[m]);
                if (!isNaN(count) && count > 0) totalSum += count;
            });
            const card = document.createElement('div');
            card.className = 'ball-card';
            card.innerHTML = `<div><div class="ball-name">${ball}</div><div class="ball-mats">${requirements.join(' + ')}</div></div><div class="ball-count">${totalSum} 个</div>`;
            container.appendChild(card);
        });
    }

    function refreshAccountSelectUI() {
        const select = document.getElementById('accountSelect');
        select.innerHTML = '';
        appData.accounts.forEach(acc => {
            const opt = document.createElement('option');
            opt.value = acc.id; opt.text = acc.name;
            if(acc.id === appData.currentId) opt.selected = true;
            select.appendChild(opt);
        });
        document.getElementById('deleteAccBtn').disabled = (appData.accounts.length <= 1);
        applyAccountDataToUI();
    }

    function switchAccount() { appData.currentId = document.getElementById('accountSelect').value; refreshAccountSelectUI(); saveToLocalCache(); }
    function updateAccountName() {
        const newName = document.getElementById('accountNameInput').value.trim();
        const currentAcc = getCurrentAccountObj();
        currentAcc.name = newName || "未命名账号";
        document.getElementById('accountSelect').options[document.getElementById('accountSelect').selectedIndex].text = currentAcc.name;
        saveToLocalCache();
    }
    function addNewAccount() {
        const newAcc = { id: "acc_" + Date.now(), name: "账号 " + (appData.accounts.length + 1), mats: createEmptyMats() };
        appData.accounts.push(newAcc); appData.currentId = newAcc.id; refreshAccountSelectUI(); saveToLocalCache();
    }
    function deleteCurrentAccount() {
        if(appData.accounts.length <= 1) return;
        if(!confirm("确定要删除当前账号吗？")) return;
        appData.accounts.splice(appData.accounts.findIndex(a => a.id === appData.currentId), 1);
        appData.currentId = appData.accounts[0].id; refreshAccountSelectUI(); saveToLocalCache();
    }
    function clearCurrentMats() {
        if(!confirm("确定清空吗？")) return;
        const currentAcc = getCurrentAccountObj();
        allMaterials.forEach(m => { currentAcc.mats[m] = 0; document.getElementById(`mat-${m}`).value = 0; });
        calculateBalls(); saveToLocalCache();
    }
    function applyAccountDataToUI() {
        const currentAcc = getCurrentAccountObj();
        document.getElementById('accountNameInput').value = currentAcc.name;
        allMaterials.forEach(m => { document.getElementById(`mat-${m}`).value = currentAcc.mats[m] || 0; });
        calculateBalls();
    }
    function saveToLocalCache() { localStorage.setItem('lk_gist_data', JSON.stringify(appData)); }

    /* ==================== 🛠️ 终极硬核无网本地同步核心 ==================== */

    // 1. 电脑端：把当前所有账号数据压缩打包生成一串加密URL，再转化为二维码
    function generateSyncQR() {
        try {
            // 打包数据
            const dataStr = btoa(encodeURIComponent(JSON.stringify(appData)));
            // 拼接成带参数的当前网页完整URL
            const baseUrl = window.location.protocol + '//' + window.location.host + window.location.pathname;
            const fullSyncUrl = baseUrl + "?d=" + dataStr;

            document.getElementById("qrcode").innerHTML = "";
            document.getElementById("qrModal").style.display = "flex";

            // 生成二维码
            qrHandler = new QRCode(document.getElementById("qrcode"), {
                text: fullSyncUrl,
                width: 240,
                height: 240,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L // 使用低容错率确保容纳超长多账号文本
            });
        } catch(e) {
            alert("生成失败，可能账号或材料数据过多超出了单张二维码限制，请精简账号数量或使用【导出/复制加密文本】功能！");
        }
    }

    function closeModal() { document.getElementById("qrModal").style.display = "none"; }

    // 2. 备用手段：直接导出加密文本串（适合发给微信文件传输助手）
    function exportTextCode() {
        const dataStr = btoa(encodeURIComponent(JSON.stringify(appData)));
        
        // 创建一个临时输入框来实现快速自动复制
        const tempInput = document.createElement("textarea");
        tempInput.value = dataStr;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);

        alert("📋 当前所有账号的数据已自动压缩并复制到剪贴板！\n\n你可以通过微信发给手机，在手机端点击【粘贴文本载入】扔进去即可瞬间同步！");
    }

    // 3. 手机端：粘贴文本直接瞬间秒读
    function importTextCode() {
        const code = prompt("请将从电脑端复制过来的加密文本粘到这里：");
        if(!code) return;
        try {
            const rawStr = decodeURIComponent(atob(code.trim()));
            const decryptedData = JSON.parse(rawStr);
            if(decryptedData && decryptedData.accounts) {
                appData = decryptedData;
                refreshAccountSelectUI();
                saveToLocalCache();
                document.getElementById('statusLabel').innerText = `文本本地读取成功: ${new Date().toLocaleTimeString()}`;
                alert("🎉 文本密匙解析成功！所有账号及物料数据已完美覆盖更新！");
            } else {
                alert("解析出的数据不完整，请确保复制了完整的加密代码串！");
            }
        } catch(e) {
            alert("解析失败！这不是合法的同步代码串，请重新复制。");
        }
    }
</script>
</body>
</html>
